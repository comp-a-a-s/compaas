name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate provider smoke-test script
        run: python -c "from scripts.provider_smoke_test import main; print('smoke-test script OK')"

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=65

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check imports resolve
        run: python -c "from src.mcp_server.server import create_server; print('OK')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Guard against native selectors
        run: npm run check:no-native-select

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E smoke
        run: npm run test:e2e:smoke
